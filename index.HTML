
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Chatbot</title>

<style>
body {
  font-family: Arial;
}

/* Chat button */
#chat-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #007bff;
  color: white;
  padding: 12px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 18px;
}

/* Chat box */
#chatbox {
  display: none;
  position: fixed;
  bottom: 70px;
  right: 20px;
  width: 320px;
  background: white;
  border: 1px solid #ccc;
  border-radius: 10px;
  padding: 10px;
}

/* Messages */
#messages {
  height: 250px;
  overflow-y: auto;
  margin-bottom: 10px;
}

.user {
  text-align: right;
  color: blue;
  margin: 5px;
}

.bot {
  text-align: left;
  color: green;
  margin: 5px;
}

/* Input */
#input {
  width: 70%;
  padding: 5px;
}
</style>
</head>

<body>

<!-- Chat Button -->
<div id="chat-btn" onclick="toggleChat()">💬</div>

<!-- Chat Box -->
<div id="chatbox">
  <div id="messages"></div>
  <input id="input" placeholder="Ask anything..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
function toggleChat() {
  let box = document.getElementById("chatbox");
  box.style.display = box.style.display === "none" ? "block" : "none";
}

async function sendMessage() {
  let inputField = document.getElementById("input");
  let input = inputField.value;
  let messages = document.getElementById("messages");

  if (!input) return;

  // Show user message
  messages.innerHTML += "<div class='user'>You: " + input + "</div>";
  inputField.value = "";

  // Show thinking
  messages.innerHTML += "<div class='bot'>Bot: Thinking...</div>";

  try {
    let response = await fetch("/.netlify/functions/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: input })
    });

    let data = await response.json();

    let reply = data.reply;

    // Replace "Thinking..."
    messages.lastChild.innerHTML = "Bot: " + reply;

  } catch (error) {
    messages.lastChild.innerHTML = "Bot: Error connecting 😢";
  }

  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
