<!DOCTYPE html>
<html>
<head>
  <title>AI Chatbot</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
    }

    #chat-container {
      width: 350px;
      height: 500px;
      border: 1px solid #ccc;
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      position: fixed;
      bottom: 80px;
      right: 20px;
      background: white;
      overflow: hidden;
    }

    #messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
    }

    .msg {
      margin: 8px 0;
      padding: 10px;
      border-radius: 10px;
      max-width: 80%;
    }

    .user {
      background: #007bff;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #eaeaea;
      color: black;
    }

    #input-area {
      display: flex;
      border-top: 1px solid #ccc;
    }

    input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 10px;
      background: #007bff;
      color: white;
      border: none;
    }

    #chat-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #007bff;
      color: white;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      border: none;
      font-size: 20px;
    }
  </style>
</head>

<body>

<button id="chat-btn" onclick="toggleChat()">💬</button>

<div id="chat-container" style="display:none;">
  <div id="messages"></div>

  <div id="input-area">
    <input id="input" placeholder="Ask anything..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
function toggleChat() {
  let chat = document.getElementById("chat-container");
  chat.style.display = chat.style.display === "none" ? "flex" : "none";
}

async function sendMessage() {
  let inputBox = document.getElementById("input");
  let message = inputBox.value;
  if (!message) return;

  let messages = document.getElementById("messages");

  messages.innerHTML += `<div class="msg user">${message}</div>`;
  inputBox.value = "";

  messages.innerHTML += `<div class="msg bot">Typing...</div>`;

  let res = await fetch("/.netlify/functions/chat", {
    method: "POST",
    body: JSON.stringify({ message })
  });

  let data = await res.json();

  let allMsgs = document.querySelectorAll(".bot");
  allMsgs[allMsgs.length - 1].innerText = data.reply;

  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
